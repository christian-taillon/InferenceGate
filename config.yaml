model_list:
  - model_name: firewall-model
    litellm_params:
      model: "openai/qwen3.5:35b-ctx100k"
      api_base: "os.environ/LITELLM_API_BASE"
      api_key: "os.environ/LITELLM_API_KEY"
      guardrails:
        - firewall

litellm_settings:
  set_verbose: False
  drop_params: True
  callbacks: ["guardrails"]

guardrails:
  - guardrail_name: "firewall"
    litellm_params:
      guardrail: litellm_content_filter
      mode: ["pre_call"]
      default_on: true
      custom_regex_config:
        - name: "PII_BLOCK"
          regex: "secret@example\\.com"
          action: "BLOCK"
        - name: "INJECTION_BLOCK"
          regex: "Ignore instructions"
          action: "BLOCK"
        - name: "BRAND_BLOCK"
          regex: "Google"
          action: "BLOCK"
